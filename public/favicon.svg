<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Yellow background -->
  <rect width="64" height="64" fill="#ffe135"/>

  <!-- Thick black border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#0a0a0a" stroke-width="4"/>

  <!-- Clipboard body -->
  <rect x="12" y="16" width="40" height="36" rx="0" fill="#fafaf5" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Clipboard top clip -->
  <rect x="22" y="11" width="20" height="10" rx="0" fill="#0a0a0a"/>
  <rect x="26" y="13" width="12" height="6" rx="0" fill="#ffe135"/>

  <!-- List lines -->
  <!-- Row 1: checked -->
  <rect x="18" y="26" width="9" height="9" fill="#0a0a0a"/>
  <polyline points="19.5,30.5 21.5,33 26,27.5" fill="none" stroke="#ffe135" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>
  <rect x="31" y="28" width="16" height="3" fill="#0a0a0a" opacity="0.8"/>

  <!-- Row 2: unchecked -->
  <rect x="18" y="39" width="9" height="9" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="31" y="41" width="12" height="3" fill="#0a0a0a" opacity="0.5"/>
</svg>